<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALI2 - Multi-Agent System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Monaco Editor -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>DALI<span class="accent">2</span></h1>
            <span class="subtitle">Multi-Agent System</span>
            <span id="node-name" class="node-label"></span>
        </div>
        <div class="header-right">
            <span id="status-indicator" class="status-dot"></span>
            <span id="status-text">Connecting...</span>
            <button id="btn-reload" class="btn btn-secondary" title="Reload agents">&#x21bb; Reload</button>
        </div>
    </header>

    <main>
        <!-- Left panel: Agents + Cluster -->
        <aside id="agents-panel">
            <h2>Local Agents</h2>
            <div id="agents-list"></div>
            <div id="cluster-section">
                <h2>Cluster <span class="count" id="cluster-count"></span></h2>
                <div id="cluster-status" class="cluster-status"></div>
                <div id="cluster-nodes"></div>
            </div>
        </aside>

        <!-- Center: Logs + File Editor -->
        <section id="logs-panel">
            <div class="panel-header">
                <div class="view-toggle">
                    <button id="btn-view-logs" class="toggle-btn active" title="View event log">Log</button>
                    <button id="btn-view-file" class="toggle-btn" title="Edit agent source file">File</button>
                </div>
                <div class="log-controls">
                    <select id="log-filter">
                        <option value="">All agents</option>
                    </select>
                    <button id="btn-clear-logs" class="btn btn-primary">Clear</button>
                    <label class="toggle">
                        <input type="checkbox" id="auto-scroll" checked>
                        <span>Auto-scroll</span>
                    </label>
                </div>
                <div class="file-controls" style="display:none;">
                    <span id="file-name" style="font-size: 0.85rem; flex: 1;"></span>
                    <button id="btn-file-save" class="btn btn-primary" title="Save file (Ctrl+S)">Save</button>
                </div>
            </div>
            <div id="logs-view" style="flex: 1; overflow: hidden;">
                <div id="log-container"></div>
            </div>
            <div id="file-view" style="display:none; overflow: hidden;">
                <div id="monaco-editor" style="overflow: hidden;"></div>
            </div>
        </section>

        <!-- Right panel: Actions + Info -->
        <aside id="info-panel">
            <!-- Send Message -->
            <div class="card">
                <h3>Send Event</h3>
                <div class="form-group">
                    <label for="send-to">To Agent</label>
                    <select id="send-to"></select>
                </div>
                <div class="form-group">
                    <label for="send-content">Event Content</label>
                    <input type="text" id="send-content" placeholder="event(arg1, arg2)" spellcheck="false">
                </div>
                <button id="btn-send" class="btn btn-primary">Send</button>
            </div>

            <!-- AI Oracle -->
            <div class="card" id="ai-card">
                <h3>AI Oracle <span id="ai-status-badge" class="badge badge-off">OFF</span></h3>
                <div class="form-group">
                    <label for="ai-key-input">OpenRouter API Key</label>
                    <div class="input-row">
                        <input type="password" id="ai-key-input" placeholder="sk-..." spellcheck="false">
                        <button id="btn-set-key" class="btn btn-small">Set</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="ai-model-select">Model</label>
                    <select id="ai-model-select">
                        <optgroup label="Free models">
                            <option value="google/gemma-4-31b-it:free">google/gemma-4-31b-it (free)</option>
                            <option value="google/gemma-4-26b-a4b-it:free">google/gemma-4-26b (free)</option>
                            <option value="qwen/qwen3-coder:free">qwen/qwen3-coder (free)</option>
                            <option value="qwen/qwen3-next-80b-a3b-instruct:free">qwen/qwen3-next-80b (free)</option>
                            <option value="nvidia/nemotron-3-super-120b-a12b:free">nvidia/nemotron-3-super-120b (free)</option>
                            <option value="nvidia/nemotron-nano-9b-v2:free">nvidia/nemotron-nano-9b-v2 (free)</option>
                            <option value="openai/gpt-oss-120b:free">openai/gpt-oss-120b (free)</option>
                            <option value="minimax/minimax-m2.5:free">minimax/minimax-m2.5 (free)</option>
                        </optgroup>
                        <optgroup label="Paid models">
                            <option value="openai/gpt-4o-mini">openai/gpt-4o-mini</option>
                            <option value="openai/gpt-4o">openai/gpt-4o</option>
                            <option value="anthropic/claude-sonnet-4">anthropic/claude-sonnet-4</option>
                            <option value="anthropic/claude-3.5-haiku">anthropic/claude-3.5-haiku</option>
                            <option value="google/gemini-2.5-flash-preview">google/gemini-2.5-flash</option>
                            <option value="google/gemini-2.5-pro-preview">google/gemini-2.5-pro</option>
                            <option value="deepseek/deepseek-chat">deepseek-chat</option>
                            <option value="meta-llama/llama-3.3-70b-instruct">meta-llama/llama-3.3-70b</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ai-context">Ask AI (test)</label>
                    <input type="text" id="ai-context" placeholder="What action should the agent take?" spellcheck="false">
                </div>
                <button id="btn-ask-ai" class="btn btn-accent">Ask AI</button>
                <div id="ai-response" class="ai-response" style="display:none"></div>
            </div>

            <!-- Agent Details -->
            <div class="card" id="agent-details" style="display:none">
                <h3>Agent: <span id="detail-name"></span></h3>
                <div class="detail-row">
                    <span class="label">Status</span>
                    <span id="detail-status" class="badge"></span>
                </div>
                <div class="detail-row">
                    <span class="label">Cycle</span>
                    <span id="detail-cycle"></span>
                </div>
                <div class="detail-section">
                    <h4>Beliefs</h4>
                    <ul id="detail-beliefs" class="mono-list"></ul>
                </div>
                <div class="detail-section">
                    <h4>Past Events <span class="count" id="past-count"></span></h4>
                    <ul id="detail-past" class="mono-list"></ul>
                </div>
                <div class="detail-actions">
                    <button class="btn btn-small btn-start">Start</button>
                    <button class="btn btn-small btn-stop">Stop</button>
                </div>
            </div>

            <!-- Blackboard -->
            <div class="card">
                <h3>Blackboard</h3>
                <ul id="blackboard-list" class="mono-list"></ul>
            </div>
        </aside>
    </main>

    <!-- Source Editor Modal -->
    <div id="editor-modal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Agent Source Editor</h2>
                <button id="btn-close-editor" class="btn btn-small">&times;</button>
            </div>
            <textarea id="source-editor" spellcheck="false"></textarea>
            <div class="modal-footer">
                <button id="btn-save-source" class="btn btn-primary">Save &amp; Reload</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
